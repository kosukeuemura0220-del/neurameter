[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "neurameter-crewai"
version = "0.1.0"
description = "CrewAI integration for NeuraMeter - track AI agent costs"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
authors = [
    {name = "Neuria", email = "dev@neuria.tech"},
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "requests>=2.28.0",
    "crewai>=0.30.0",
]

[project.urls]
Homepage = "https://github.com/neuria-dev/neurameter"
Repository = "https://github.com/neuria-dev/neurameter"
Documentation = "https://docs.meter.neuria.tech"

[tool.setuptools.packages.find]
where = ["src"]
